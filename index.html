<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABA Flats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
  video {
    position: fixed; top: 50%; left: 50%;
    min-width: 100%; min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover; z-index: -1;
  }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; color: #fff;
    padding: 2rem;
  }
  .brand { font-size: 1rem; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0.7; margin-bottom: 1rem; }
  h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 300; margin-bottom: 0.5rem; }
  .tagline { font-size: clamp(1rem, 2.5vw, 1.25rem); opacity: 0.8; margin-bottom: 3rem; font-weight: 300; }
  .divider { width: 60px; height: 1px; background: rgba(255,255,255,0.4); margin-bottom: 2.5rem; }
  .contact-label { font-size: clamp(1.2rem, 3vw, 1.6rem); letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.85; margin-bottom: 0.6rem; }
  .contact-desc { font-size: clamp(0.95rem, 2vw, 1.1rem); opacity: 0.6; font-weight: 300; margin-bottom: 1.5rem; }
  .contact a { color: #fff; text-decoration: none; font-size: clamp(1.05rem, 2.5vw, 1.3rem); font-weight: 300; }
  .contact a:hover { opacity: 0.7; }
  .contact p { margin-bottom: 0.6rem; }
</style>
</head>
<body>
<video autoplay muted loop playsinline>
  <source src="bg_video.mp4" type="video/mp4">
</video>
<div class="overlay">
  <p class="brand">BABA Flats</p>
  <h1>Welcome to BABA Flats</h1>
  <p class="tagline">Something exciting is on its way. Stay tuned.</p>
  <div class="divider"></div>
  <p class="contact-label">Get in Touch</p>
  <p class="contact-desc">We'd love to hear from you. Feel free to reach out — we're happy to help.</p>
  <div class="contact">
    <p><a href="tel:+17707268907">+1 (770) 726-8907</a></p>
    <p><a href="tel:+14049801284">+1 (404) 980-1284</a></p>
    <p><a href="https://wa.me/14049801284" target="_blank">WhatsApp Us</a></p>
    <p><a href="mailto:contact@babaflats.com">contact@babaflats.com</a></p>
  </div>
</div>
</body>
</html>
